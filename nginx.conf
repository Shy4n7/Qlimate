server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api requests to the Render backend service
    location /api/ {
        proxy_pass https://qlimate-backend.onrender.com/;
        proxy_set_header Host qlimate-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # React SPA — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
